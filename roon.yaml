# Author: GuYe
priority: -10
use-epoll: true
fd-max: 65535
max-dial-timeout: 60
gc-interval: 3600
mixed-port: 7890
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: error
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

geodata-mode: true
geo-auto-update: true
geo-update-interval: 12

geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443,8443]
    HTTP:
      ports: [80,8080-8880]
      override-destination: true
    QUIC:
      ports: []
  skip-domain:
  - "Mijia Cloud"
  - "dlg.io.mc"
  - "+.push.apple.com"
  - "+.googlevideo.com"
  force-domain:
  - "+.roonlabs.net"
  - "+.roonlabs.com"
  - "+.tidal.com"
  - "+.qobuz.com"

tun:
  enable: true
  stack: mixed
  mtu: 1480
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  route-mtu: 1480
  gso: true
  dns-hijack:
  - any:53
  - tcp://any:53

rc4: false
udp-max-packet-size: 65535
keep-alive: 15
enable-process-name-sniffer: false

proxy-providers:
  Airport:
    type: http
    url: "你的机场订阅地址"
    interval: 43200
    path: ./proxy_providers/Airport.yaml
    proxy: DIRECT
    exclude-type: "macc"
    health-check:
      enable: true
      url: https://api.roonlabs.net/2/extensions/info
      interval: 180
      timeout: 2000
      tolerance: 200

proxy-groups:
- name: ROON
  type: url-test
  use:
  - Airport
  url: https://api.roonlabs.net/2/extensions/info
  interval: 300
  tolerance: 200
  timeout: 2000
  lazy: false
  udp: true
  recv-window: 134217728
  read-buffer-size: 33554432
  write-buffer-size: 33554432
  fast-open: true
  tcp-fast-open: true
  tcp-congestion: bbr
  udp-relay: true
  keep-alive: 15
  ip-version: ipv4
  failover: 3
  retry: 2

- name: PROXY
  type: select
  use:
  - Airport
  proxies:
  - AUTO
  - DIRECT
  default: AUTO

- name: AUTO
  type: url-test
  use:
  - Airport
  url: https://www.gstatic.com/generate_204
  interval: 180
  tolerance: 30
  failover: 2

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - "+.localdomain"
  - "localhost.ptlogin2.qq.com"
  - "time.windows.com"
  - "time.apple.com"
  - "time.android.com"
  - "+.googleapis.cn"
  - "+.xn--ngstr-lra8j.com"
  - "+.ntp.org.cn"
  - "+.pool.ntp.org"
  - "+.roonlabs.net"
  - "+.roonlabs.com"
  - "+.tidal.com"
  - "+.qobuz.com"

  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8

  nameserver:
  - "https://1.1.1.1/dns-query#PROXY"
  - "https://dns.google/dns-query#PROXY"

  fallback:
  - "https://1.1.1.1/dns-query#PROXY"

  proxy-server-nameserver:
  - 1.1.1.1
  - 8.8.8.8

  direct-nameserver:
  - 223.5.5.5
  - 119.29.29.29

  nameserver-policy:
    "geosite:private,cn,apple-cn,microsoft@cn,steam@cn":
    - 223.5.5.5
    - 119.29.29.29
    "+.google.com":
    - "https://1.1.1.1/dns-query#PROXY"
    "+.googleapis.com":
    - "https://1.1.1.1/dns-query#PROXY"
    "+.roonlabs.com":
    - "https://1.1.1.1/dns-query#ROON"
    "+.roonlabs.net":
    - "https://1.1.1.1/dns-query#ROON"
    "+.tidal.com":
    - "https://1.1.1.1/dns-query#ROON"
    "+.qobuz.com":
    - "https://1.1.1.1/dns-query#ROON"
    "geosite:geolocation-!cn":
    - "https://1.1.1.1/dns-query#PROXY"
    "geosite:gfw":
    - "https://1.1.1.1/dns-query#PROXY"

  fallback-filter:
    geoip: true
    geoip-code: CN

rules:
- DOMAIN-SUFFIX,roonlabs.com,ROON
- DOMAIN-SUFFIX,roonlabs.net,ROON
- DOMAIN-SUFFIX,tidal.com,ROON
- DOMAIN-SUFFIX,qobuz.com,ROON
- DOMAIN-KEYWORD,roon,ROON
- DOMAIN-KEYWORD,tidal,ROON
- DOMAIN-KEYWORD,qobuz,ROON

- GEOSITE,private,DIRECT
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- IP-CIDR,198.18.0.0/15,DIRECT,no-resolve

- GEOSITE,google,PROXY
- GEOSITE,youtube,PROXY
- GEOSITE,github,PROXY
- GEOSITE,telegram,PROXY

- GEOSITE,apple-cn,DIRECT
- GEOSITE,microsoft@cn,DIRECT
- DOMAIN-SUFFIX,cn,DIRECT
- GEOSITE,cn,DIRECT
- GEOIP,CN,DIRECT,no-resolve

- GEOSITE,geolocation-!cn,PROXY
- MATCH,PROXY
